<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
}

h1 { margin-top: 20px; }

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

.click { background: #00c6ff; font-size: 22px; }
.upg { background: #ffb347; }
.withdraw { background: #ff4b5c; }
.settings { background: #7c4dff; }

input {
  padding: 10px;
  width: 80%;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

.version {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 14px;
  opacity: 0.7;
}

/* 💥 модальное окно */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background: #1f2a44;
  padding: 20px;
  margin: 100px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}
</style>
</head>

<body>

<h1>💰 AimBrawlClicker</h1>

<div class="card">
  <h3>👤 Ваш ID: <span id="showId">не установлен</span></h3>
  <button class="settings" onclick="openSettings()">⚙ Настройки</button>
</div>

<div class="card">
  <button class="click" id="clickBtn">КЛИК!</button>

  <p>Баланс: <span id="balance">0</span></p>
  <p>Сила клика: <span id="power">1</span></p>
</div>

<div class="card">
  <h2>🛒 Магазин</h2>

  <button class="upg" id="upgradeBtn">
    +1 к клику (Цена: <span id="price">10</span>)
  </button>

  <p id="msg"></p>
</div>

<div class="card">
  <h2>💸 Вывод</h2>

  <button class="withdraw" onclick="openWithdraw()">
    Вывести монеты
  </button>

  <p id="withdrawMsg"></p>
</div>

<!-- 💥 ОКНО ВЫВОДА -->
<div class="modal" id="withdrawModal">
  <div class="modal-content">
    <h3>⚠ Подтверждение вывода</h3>

    <p id="confirmText"></p>

    <p style="font-size:14px; opacity:0.8;">
      📸 ОБЯЗАТЕЛЬНО сделайте скриншот этого окна
    </p>

    <button class="withdraw" onclick="createWithdraw()">
      Создать заявку
    </button>

    <button onclick="closeModal()" style="margin-top:10px;">
      Отмена
    </button>
  </div>
</div>

<!-- ⚙ НАСТРОЙКИ -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h3>⚙ Настройки</h3>

    <input id="playerIdInput" placeholder="Введите ваш ID">

    <button onclick="saveSettings()" class="settings">
      Сохранить
    </button>

    <button onclick="closeSettings()" style="margin-top:10px;">
      Закрыть
    </button>
  </div>
</div>

<div class="version">версия 0.4.8</div>

<script>

let balance = Number(localStorage.getItem("balance")) || 0;
let power = Number(localStorage.getItem("power")) || 1;
let price = Number(localStorage.getItem("price")) || 10;
let playerId = localStorage.getItem("playerId") || "";

function update() {
  document.getElementById("balance").innerText = balance;
  document.getElementById("power").innerText = power;
  document.getElementById("price").innerText = price;
  document.getElementById("showId").innerText = playerId || "не установлен";
}

function save() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("power", power);
  localStorage.setItem("price", price);
}

update();

// 💰 клик
document.getElementById("clickBtn").onclick = () => {
  balance += power;
  save();
  update();
};

// 🛒 магазин
document.getElementById("upgradeBtn").onclick = () => {
  if (balance >= price) {
    balance -= price;
    power++;
    price = Math.floor(price * 1.5);
    save();
    update();
    document.getElementById("msg").innerText = "✔ Улучшение куплено!";
  } else {
    document.getElementById("msg").innerText = "❌ Не хватает монет";
  }
};

function openSettings() {
  document.getElementById("settingsModal").style.display = "block";
}

function closeSettings() {
  document.getElementById("settingsModal").style.display = "none";
}

function saveSettings() {
  playerId = document.getElementById("playerIdInput").value;
  localStorage.setItem("playerId", playerId);
  update();
  closeSettings();
}

// 💸 открыть подтверждение
function openWithdraw() {
  if (balance < 100) {
    alert("❌ Нужно минимум 100 монет");
    return;
  }

  if (!playerId) {
    alert("❌ Сначала укажите ID в настройках");
    return;
  }

  document.getElementById("confirmText").innerText =
`ID: ${playerId}
Баланс вывода: ${balance} монет`;

  document.getElementById("withdrawModal").style.display = "block";
}

function closeModal() {
  document.getElementById("withdrawModal").style.display = "none";
}

// 💥 создание заявки
function createWithdraw() {
  let sendBalance = balance;

  balance = 0;
  save();
  update();

  closeModal();

  document.getElementById("withdrawMsg").innerText =
"📩 Заявка создана! Ожидайте проверки.";

  window.open("https://forms.gle/H24uHTgV68MiKC6m9", "_blank");
}

</script>

</body>
</html>
