<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #00c6ff;
  --bg-dark: #0f172a;
  --card-dark: #1e293b;
  --text-light: #f8fafc;
  --transition: all 0.3s ease;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  background: var(--bg-dark);
  color: var(--text-light);
  height: 100vh;
}

/* ТЕМЫ */
.light { background: #f1f5f9; color: #1e293b; }
.light .card { background: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
.light .modal-content { background: white; color: #1e293b; }
.light .bottom-nav { background: rgba(255, 255, 255, 0.8); }

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  align-items: center;
  font-weight: 800;
  font-size: 1.2rem;
}

.menu-icon {
  cursor: pointer;
  font-size: 24px;
  padding: 5px;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  right: -280px;
  top: 0;
  width: 260px;
  height: 100%;
  background: var(--card-dark);
  padding: 30px 20px;
  transition: var(--transition);
  z-index: 1000;
  box-shadow: -5px 0 15px rgba(0,0,0,0.3);
}
.sidebar.active { right: 0; }

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #334155;
  margin: 10px 0 20px;
  background: #0f172a;
  color: white;
  box-sizing: border-box;
}

.saveBtn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: 700;
  cursor: pointer;
}

/* MAIN CARD */
.card {
  text-align: center;
  margin: 20px;
  padding: 20px;
  background: var(--card-dark);
  border-radius: 24px;
}

.stat-val { font-weight: 800; color: var(--primary); }

/* CLICKER */
.clickWrap {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.clickBtn {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--primary) 0%, #0072ff 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(0, 198, 255, 0.4);
  transition: transform 0.1s;
  user-select: none;
}
.clickBtn:active { transform: scale(0.92); }

#crystalImg {
  width: 120px;
  height: 120px;
  object-fit: contain;
  pointer-events: none;
}

/* FLOATING BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 25px; /* Отступ снизу */
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  background: rgba(30, 41, 59, 0.9);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-radius: 25px; /* Сильное закругление */
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  z-index: 900;
  border: 1px solid rgba(255,255,255,0.1);
}

.nav-item {
  background: none;
  border: none;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  padding: 10px 20px;
  border-radius: 15px;
  transition: var(--transition);
}
.nav-item:active { background: rgba(255,255,255,0.1); }
.nav-item span { font-size: 20px; margin-bottom: 4px; }

/* MODERN MODALS */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.8);
  z-index: 2000;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

.modal-content {
  background: var(--card-dark);
  padding: 25px;
  position: absolute;
  bottom: 0; /* Выезжает снизу, как в современных приложениях */
  width: 100%;
  box-sizing: border-box;
  border-radius: 30px 30px 0 0;
  text-align: center;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp { from {transform: translateY(100%);} to {transform: translateY(0);} }

.shop-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin: 20px 0;
}

.buy-btn {
  background: #334155;
  border: none;
  padding: 15px;
  border-radius: 16px;
  color: white;
  cursor: pointer;
  transition: var(--transition);
}
.buy-btn:hover { background: #475569; }
.buy-btn b { color: var(--primary); display: block; font-size: 1.1rem; }

.close-modal {
  background: none;
  border: none;
  color: #94a3b8;
  text-decoration: underline;
  margin-top: 15px;
  cursor: pointer;
}

#timer {
  font-weight: 800;
  color: #ef4444;
  height: 20px;
}
</style>
</head>

<body id="body">

<div class="header">
  <span>AimBrawl <span style="color:var(--primary)">Clicker</span></span>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
</div>

<div class="sidebar" id="sidebar">
  <h3>Настройки</h3>
  <label>Ваш ID</label>
  <input id="playerId" placeholder="Введите ID...">

  <label>Тема</label>
  <select id="themeSel">
    <option value="dark">Темная</option>
    <option value="light">Светлая</option>
  </select>

  <label>Язык</label>
  <select id="langSel">
    <option value="ru">Русский</option>
    <option value="en">English</option>
  </select>

  <button class="saveBtn" onclick="saveSettings()">Сохранить</button>
</div>

<div class="card">
  <div style="font-size: 0.9rem; opacity: 0.7;">ID: <span id="showId">-</span></div>
  <h2 id="balanceText">Кристаллы: <span id="balance" class="stat-val">0</span></h2>
  <div style="display: flex; justify-content: space-around; margin-top: 10px;">
    <div>Сила: <span id="power" class="stat-val">1</span></div>
    <div>Кулдаун: <span class="stat-val">5с</span></div>
  </div>
  <p id="timer"></p>
</div>

<div class="clickWrap">
  <div class="clickBtn" id="clickBtn">
    <img src="crystal.png" id="crystalImg" alt="💎">
  </div>
</div>

<div class="modal" id="shopModal">
  <div class="modal-content">
    <div style="width: 40px; height: 5px; background: #334155; margin: 0 auto 20px; border-radius: 10px;"></div>
    <h3>Магазин улучшений</h3>
    <div class="shop-grid">
      <button class="buy-btn" onclick="buy(2, 50)"><b>+2 Сила</b> 💰 50</button>
      <button class="buy-btn" onclick="buy(5, 150)"><b>+5 Сила</b> 💰 150</button>
      <button class="buy-btn" onclick="buy(10, 500)"><b>+10 Сила</b> 💰 500</button>
      <button class="buy-btn" onclick="buy(50, 2000)"><b>+50 Сила</b> 💰 2000</button>
    </div>
    <button class="close-modal" onclick="closeModal('shopModal')">Закрыть</button>
  </div>
</div>

<div class="modal" id="withdrawModal">
  <div class="modal-content">
    <div style="width: 40px; height: 5px; background: #334155; margin: 0 auto 20px; border-radius: 10px;"></div>
    <h3>Вывод средств</h3>
    <p id="confirmText" style="margin-bottom: 20px; opacity: 0.8;"></p>
    <button class="saveBtn" onclick="createWithdraw()">Создать заявку</button>
    <br>
    <button class="close-modal" onclick="closeModal('withdrawModal')">Отмена</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item" onclick="openModal('shopModal')">
    <span>🛒</span> Магазин
  </button>
  <button class="nav-item" onclick="openModal('withdrawModal')">
    <span>💸</span> Вывод
  </button>
</div>

<script>
/* Состояние */
let state = {
  balance: +localStorage.getItem("balance") || 0,
  power: +localStorage.getItem("power") || 1,
  playerId: localStorage.getItem("playerId") || "",
  theme: localStorage.getItem("theme") || "dark",
  lang: localStorage.getItem("lang") || "ru",
  cooldownUntil: +localStorage.getItem("cooldownUntil") || 0
};

let timerInt;

/* Инициализация */
function init() {
  document.getElementById("body").className = state.theme;
  document.getElementById("playerId").value = state.playerId;
  document.getElementById("themeSel").value = state.theme;
  document.getElementById("langSel").value = state.lang;
  
  updateUI();
  if (Date.now() < state.cooldownUntil) startTimer();
}

function save() {
  for (let key in state) {
    localStorage.setItem(key, state[key]);
  }
}

function updateUI() {
  document.getElementById("balance").innerText = state.balance;
  document.getElementById("power").innerText = state.power;
  document.getElementById("showId").innerText = state.playerId || "Не указан";
}

/* Клик */
document.getElementById("clickBtn").onclick = () => {
  if (Date.now() < state.cooldownUntil) return;

  state.balance += state.power;
  state.cooldownUntil = Date.now() + 5000;

  save();
  updateUI();
  startTimer();
};

function startTimer() {
  if (timerInt) clearInterval(timerInt);
  
  timerInt = setInterval(() => {
    let left = state.cooldownUntil - Date.now();
    if (left <= 0) {
      document.getElementById("timer").innerText = "";
      clearInterval(timerInt);
      return;
    }
    document.getElementById("timer").innerText = "Ожидание: " + Math.ceil(left / 1000) + "с";
  }, 200);
}

/* Настройки */
function saveSettings() {
  state.playerId = document.getElementById("playerId").value;
  state.theme = document.getElementById("themeSel").value;
  state.lang = document.getElementById("langSel").value;

  document.getElementById("body").className = state.theme;
  save();
  updateUI();
  toggleMenu();
}

/* Модальные окна */
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
}

function openModal(id) {
  if(id === 'withdrawModal') {
    document.getElementById("confirmText").innerText = `Готовы вывести ${state.balance} кристаллов на ID ${state.playerId || '(не указан)'}?`;
  }
  document.getElementById(id).style.display = "block";
}

function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

function buy(p, c) {
  if (state.balance < c) {
    alert("Недостаточно кристаллов!");
    return;
  }
  state.balance -= c;
  state.power += p;
  save();
  updateUI();
}

function createWithdraw() {
  if(state.balance < 100) {
    alert("Минимальный вывод от 100 кристаллов");
    return;
  }
  window.open("https://forms.gle/ваш_id", "_blank");
  state.balance = 0;
  save();
  updateUI();
  closeModal('withdrawModal');
}

// Закрытие модалок при клике вне контента
window.onclick = function(event) {
  if (event.target.className === 'modal') {
    event.target.style.display = "none";
  }
};

init();
</script>

</body>
</html>
