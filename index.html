<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker v0.6.6</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00c6ff;
  --bg: #0f172a;
  --text: #ffffff;
  --card-bg: #1e293b;
  --input-bg: #0f172a;
  --input-text: #ffffff;
  --rare: #4ade80;
  --super-rare: #60a5fa;
  --epic: #a855f7;
  --mythic: #f43f5e;
  --legendary: #fbbf24;
  --admin-neon: #ff00ff;
}

.light { --bg: #f1f5f9; --text: #1e293b; --card-bg: #ffffff; --input-bg: #e2e8f0; --input-text: #1e293b; }

body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; user-select: none; overflow-x: hidden; }

.header { display: flex; justify-content: space-between; padding: 20px; font-weight: 800; }
.version { font-size: 0.8rem; opacity: 0.5; margin-left: 5px; }

/* SIDEBAR */
.sidebar { position: fixed; right: -280px; top: 0; width: 260px; height: 100%; background: var(--card-bg); padding: 30px 20px; transition: 0.3s; z-index: 1000; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
.sidebar.active { right: 0; }

input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); margin: 10px 0 20px; background: var(--input-bg); color: var(--input-text); }

.btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }

#adminLink { display: none; margin-top: 15px; color: var(--admin-neon); font-weight: 800; cursor: pointer; text-align: center; border: 1px solid var(--admin-neon); padding: 8px; border-radius: 10px; box-shadow: 0 0 10px rgba(255, 0, 255, 0.2); }

/* КАРТОЧКИ */
.card { text-align: center; margin: 15px; padding: 20px; background: var(--card-bg); border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.stat-box { display: flex; justify-content: space-around; margin-top: 10px; font-size: 0.9rem; }

/* КЛИКЕРЫ */
.click-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 10px; }
.clickBtn { 
    width: 160px; height: 160px; border-radius: 50%; 
    background: radial-gradient(circle, var(--primary) 0%, #0072ff 100%); 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    box-shadow: 0 0 20px rgba(0, 198, 255, 0.4); transition: 0.1s;
}
.clickBtn:active { transform: scale(0.92); }
#crystalImg { width: 100px; height: 100px; object-fit: contain; background: transparent !important; }

/* СУПЕР КЛИК */
.super-click-btn {
    background: linear-gradient(45deg, #fbbf24, #f59e0b);
    color: white; border: none; padding: 15px 30px; border-radius: 50px;
    font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
}
.super-click-btn:disabled { background: #475569; opacity: 0.7; cursor: not-allowed; }

/* НИЖНЯЯ ПАНЕЛЬ */
.bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; background: var(--card-bg); display: flex; justify-content: space-around; padding: 12px 5px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 900; }
.nav-item { background: none; border: none; color: var(--text); display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; cursor: pointer; flex: 1; }
.nav-item span { font-size: 20px; margin-bottom: 4px; }

/* МОДАЛКИ */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; }
.modal-content { background: var(--card-bg); padding: 25px; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; border-radius: 35px 35px 0 0; text-align: center; color: var(--text); max-height: 85vh; overflow-y: auto; }

/* МАГАЗИН */
.shop-item { background: var(--input-bg); padding: 15px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; text-align: left; border-left: 5px solid gray; }
.shop-item.rare { border-color: var(--rare); }
.shop-item.super-rare { border-color: var(--super-rare); }
.shop-item.epic { border-color: var(--epic); }
.shop-item.mythic { border-color: var(--mythic); }
.shop-item.legendary { border-color: var(--legendary); }
.shop-item button { padding: 8px 15px; border-radius: 10px; border: none; background: var(--primary); color: white; cursor: pointer; }
.shop-item button:disabled { background: #334155; }

/* АДМИНКА ДИЗАЙН */
.admin-modal { border: 2px solid var(--admin-neon); box-shadow: 0 0 30px rgba(255, 0, 255, 0.4); }
.admin-grid { display: grid; gap: 10px; margin: 20px 0; }
.admin-btn { background: none; border: 1px solid var(--admin-neon); color: var(--admin-neon); padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: inset 0 0 5px rgba(255, 0, 255, 0.2); }
.admin-btn:hover { background: var(--admin-neon); color: white; box-shadow: 0 0 20px var(--admin-neon); }

#timer, #superTimer { color: #f43f5e; font-weight: 800; font-size: 0.8rem; height: 15px; }
</style>
</head>
<body id="body">

<div class="header">
  <div>AimBrawl <span style="color:var(--primary)">Clicker</span><span class="version">v0.6.6</span></div>
  <div style="cursor:pointer; font-size:24px;" onclick="toggleMenu()">☰</div>
</div>

<div class="sidebar" id="sidebar">
  <h3 id="t_settings">Настройки</h3>
  <label id="t_your_id">Ваш ID</label>
  <input id="playerIdInput" placeholder="ID...">
  <div id="adminLink" onclick="openModal('adminModal')">⚡ DEV PANEL ⚡</div>
  <label id="t_theme">Тема</label>
  <select id="themeSel"><option value="dark">Dark</option><option value="light">Light</option></select>
  <label id="t_lang">Язык</label>
  <select id="langSel"><option value="ru">Русский</option><option value="en">English</option></select>
  <button class="btn-main" onclick="saveSettings()" id="t_save">Сохранить</button>
</div>

<div class="card">
  <div style="opacity: 0.6; font-size: 0.8rem;">ID: <span id="displayId">-</span></div>
  <h2 style="margin: 5px 0;"><span id="t_crystals">Кристаллы</span>: <span id="balance" style="color:var(--primary)">0.0</span></h2>
  <div class="stat-box">
    <div><span id="t_power">Сила</span>: <b id="powerVal">0.1</b></div>
    <div><span id="t_cooldown">Задержка</span>: <b id="cdVal">3</b>с</div>
  </div>
  <p id="timer"></p>
</div>

<div class="click-container">
  <div class="clickBtn" id="clickBtn">
    <img src="crystal.png" id="crystalImg" alt="💎">
  </div>
  <button class="super-click-btn" id="superBtn" onclick="superClick()">SUPER CLICK 🍀</button>
  <p id="superTimer"></p>
</div>

<div class="modal" id="dailyModal"><div class="modal-content"><h3 id="t_daily_title">Награды</h3><div id="dailyGrid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:20px 0;"></div><button class="btn-main" id="claimBtn" onclick="claimDaily()">Забрать</button><br><button onclick="closeModal('dailyModal')" style="background:none; border:none; color:var(--text); margin-top:15px;" id="t_close_daily">Закрыть</button></div></div>

<div class="modal" id="shopModal">
  <div class="modal-content">
    <h3 id="t_shop_title">Магазин Редкостей</h3>
    <div id="shopList"></div>
    <hr style="opacity: 0.1; margin: 15px 0;">
    <div class="shop-item" style="border-left: 5px solid #000;">
       <div><b>Super-Click 2x Speed</b><br><small>12h → 6h</small></div>
       <button id="buySuperUpgrade" onclick="buySuperCD()">💰 1000</button>
    </div>
    <button onclick="closeModal('shopModal')" style="background:none; border:none; color:var(--primary); margin-top:10px;">Закрыть</button>
  </div>
</div>

<div class="modal" id="withdrawModal"><div class="modal-content"><h3>Вывод</h3><p id="withdrawConfirmText"></p><button class="btn-main" onclick="createWithdraw()">Создать заявку</button><br><button onclick="closeModal('withdrawModal')" style="opacity:0.5; background:none; border:none; color:var(--text); margin-top:15px;">Отмена</button></div></div>

<div class="modal" id="adminModal">
  <div class="modal-content admin-modal">
    <h2 style="color: var(--admin-neon); text-shadow: 0 0 10px var(--admin-neon);">BRO67 ADMIN PANEL</h2>
    <div class="admin-grid">
      <button class="admin-btn" onclick="adminAction('money')">+100,000 CRYSTALS</button>
      <button class="admin-btn" onclick="adminAction('cd')">REMOVE MAIN COOLDOWN</button>
      <button class="admin-btn" onclick="adminAction('unlimited_super')" style="border-width: 2px;">⚡ UNLIMITED SUPER-CLICK ⚡</button>
      <button class="admin-btn" onclick="adminAction('power')">SET CUSTOM POWER</button>
    </div>
    <button onclick="closeModal('adminModal')" style="color:white; background:none; border:none; margin-top:15px; opacity: 0.6;">CLOSE</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item" onclick="openModal('shopModal')"><span>🛒</span>Магазин</button>
  <button class="nav-item" onclick="openModal('dailyModal')"><span>🎁</span>Награды</button>
  <button class="nav-item" onclick="openModal('withdrawModal')"><span>💸</span>Вывод</button>
</div>

<script>
const ADMIN_SECRET = "BRO67";

const SHOP_ITEMS = [
  { id: 'item1', rarity: 'rare', name: '+1 Click', price: 50, power: 1, cd: 5000 },
  { id: 'item2', rarity: 'super-rare', name: '+2 Click', price: 150, power: 2, cd: 15000 },
  { id: 'item3', rarity: 'epic', name: '+5 Click', price: 500, power: 5, cd: 60000 },
  { id: 'item4', rarity: 'mythic', name: '+10 Click', price: 2000, power: 10, cd: 900000 },
  { id: 'item5', rarity: 'legendary', name: '+25 Click', price: 10000, power: 25, cd: 3600000 }
];

let state = {
  balance: parseFloat(localStorage.getItem("b_066")) || 0,
  power: parseFloat(localStorage.getItem("p_066")) || 0.1,
  currentCD: parseInt(localStorage.getItem("cd_066")) || 3000,
  playerId: localStorage.getItem("id_066") || "",
  theme: localStorage.getItem("th_066") || "dark",
  lang: localStorage.getItem("ln_066") || "ru",
  cooldownUntil: parseInt(localStorage.getItem("cu_066")) || 0,
  superNextClaim: parseInt(localStorage.getItem("sn_066")) || 0,
  superInterval: parseInt(localStorage.getItem("si_066")) || 43200000,
  purchased: JSON.parse(localStorage.getItem("inv_066")) || []
};

let timers = { main: null, super: null };

function save() {
  localStorage.setItem("b_066", state.balance.toFixed(1));
  localStorage.setItem("p_066", state.power);
  localStorage.setItem("cd_066", state.currentCD);
  localStorage.setItem("id_066", state.playerId);
  localStorage.setItem("th_066", state.theme);
  localStorage.setItem("ln_066", state.lang);
  localStorage.setItem("cu_066", state.cooldownUntil);
  localStorage.setItem("sn_066", state.superNextClaim);
  localStorage.setItem("si_066", state.superInterval);
  localStorage.setItem("inv_066", JSON.stringify(state.purchased));
}

function updateUI() {
  document.getElementById("balance").innerText = state.balance.toFixed(1);
  document.getElementById("powerVal").innerText = state.power;
  document.getElementById("cdVal").innerText = state.currentCD / 1000;
  document.getElementById("displayId").innerText = state.playerId || "-";
  document.getElementById("body").className = state.theme;
  document.getElementById("adminLink").style.display = (state.playerId === ADMIN_SECRET) ? "block" : "none";
  renderShop();
  checkSuperTimer();
}

/* КЛИКИ */
document.getElementById("clickBtn").onclick = () => {
  if (Date.now() < state.cooldownUntil) return;
  state.balance += state.power;
  state.cooldownUntil = Date.now() + state.currentCD;
  save(); updateUI(); startMainTimer();
};

function startMainTimer() {
  if (timers.main) clearInterval(timers.main);
  timers.main = setInterval(() => {
    let left = state.cooldownUntil - Date.now();
    if (left <= 0) { document.getElementById("timer").innerText = ""; clearInterval(timers.main); return; }
    document.getElementById("timer").innerText = "Жди: " + Math.ceil(left/1000) + "с";
  }, 200);
}

/* СУПЕР КЛИК */
function superClick() {
  if (Date.now() < state.superNextClaim) return;
  
  let r = Math.random() * 100;
  let win = 10;
  if (r > 99.5) win = 10000;
  else if (r > 95) win = 1000;
  else if (r > 85) win = 100;

  state.balance += win;
  state.superNextClaim = Date.now() + state.superInterval;
  save(); updateUI();
  alert("JACKPOT: " + win + " 💎");
}

function checkSuperTimer() {
  if (timers.super) clearInterval(timers.super);
  const btn = document.getElementById("superBtn");
  const display = document.getElementById("superTimer");
  
  timers.super = setInterval(() => {
    let left = state.superNextClaim - Date.now();
    if (left <= 0) {
      btn.disabled = false; btn.innerText = "SUPER CLICK 🍀";
      display.innerText = "";
      clearInterval(timers.super);
    } else {
      btn.disabled = true;
      let h = Math.floor(left/3600000), m = Math.floor((left%3600000)/60000), s = Math.floor((left%60000)/1000);
      display.innerText = `${h}h ${m}m ${s}s`;
    }
  }, 1000);
}

/* МАГАЗИН */
function renderShop() {
  const container = document.getElementById("shopList");
  if (!container) return;
  container.innerHTML = "";
  SHOP_ITEMS.forEach(item => {
    const isBought = state.purchased.includes(item.id);
    container.innerHTML += `
      <div class="shop-item ${item.rarity}">
        <div>
          <b>${item.name}</b> [${item.rarity.toUpperCase()}]<br>
          <small>+${item.power} Power | CD: ${item.cd/1000}s</small>
        </div>
        <button onclick="buyItem('${item.id}')" ${isBought ? 'disabled' : ''}>
          ${isBought ? 'Bought' : '💰 ' + item.price}
        </button>
      </div>`;
  });
  
  const superUp = document.getElementById("buySuperUpgrade");
  if(state.superInterval < 43200000) { superUp.disabled = true; superUp.innerText = "Bought"; }
}

function buyItem(id) {
  const item = SHOP_ITEMS.find(x => x.id === id);
  if (state.balance < item.price) return alert("Недостаточно!");
  state.balance -= item.price;
  state.power += item.power;
  state.currentCD = item.cd;
  state.purchased.push(id);
  save(); updateUI();
}

function buySuperCD() {
  if (state.balance < 1000) return alert("Недостаточно!");
  state.balance -= 1000;
  state.superInterval = 21600000;
  save(); updateUI();
}

/* СИСТЕМНЫЕ */
function saveSettings() {
  state.playerId = document.getElementById("playerIdInput").value;
  state.theme = document.getElementById("themeSel").value;
  state.lang = document.getElementById("langSel").value;
  save(); updateUI(); toggleMenu();
}
function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }
function openModal(id) { document.getElementById(id).style.display = "block"; }
function closeModal(id) { document.getElementById(id).style.display = "none"; }

function createWithdraw() {
  window.open("https://forms.gle/H24uHTgV68MiKC6m9", "_blank");
  state.balance = 0; save(); updateUI(); closeModal('withdrawModal');
}

/* ADMIN ACTIONS v0.6.6 */
function adminAction(type) {
  if (type === 'money') state.balance += 100000;
  if (type === 'cd') { 
      state.cooldownUntil = 0; 
      if(timers.main) clearInterval(timers.main); 
      document.getElementById("timer").innerText = ""; 
  }
  if (type === 'unlimited_super') { 
      state.superNextClaim = 0; 
      if(timers.super) clearInterval(timers.super);
      document.getElementById("superTimer").innerText = "";
      alert("SUPER-CLICK READY! 🍀");
  }
  if (type === 'power') { 
      let p = prompt("New Power (e.g. 100):"); 
      if(p) state.power = parseFloat(p); 
  }
  save(); updateUI();
}

// Init
document.getElementById("playerIdInput").value = state.playerId;
updateUI();
if (Date.now() < state.cooldownUntil) startMainTimer();
</script>
</body>
</html>
