<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
  }

  h1 {
    margin-top: 20px;
  }

  .card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    margin: 15px auto;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
  }

  button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
    cursor: pointer;
  }

  .click {
    background: #00c6ff;
    font-size: 22px;
  }

  .upg {
    background: #ffb347;
  }

  .withdraw {
    background: #ff4b5c;
  }

  input {
    margin-top: 10px;
  }

  /* 📍 версия внизу слева */
  .version {
    position: fixed;
    bottom: 10px;
    left: 10px;
    opacity: 0.7;
    font-size: 14px;
  }
</style>
</head>

<body>

<h1>💰 AimBrawlClicker</h1>

<div class="card">
  <button class="click" id="clickBtn">КЛИК!</button>

  <p>Баланс: <span id="balance">0</span></p>
  <p>Сила клика: <span id="power">1</span></p>
  <p id="cooldownText"></p>
</div>

<div class="card">
  <h2>🛒 Магазин</h2>

  <button class="upg" id="upgradeBtn">
    +1 к клику (Цена: <span id="price">10</span>)
  </button>

  <p id="msg"></p>
</div>

<div class="card">
  <h2>💸 Вывод</h2>

  <input id="userId" placeholder="Введите ваш ID"
  style="padding:10px; width:80%; border-radius:8px; border:none;">

  <button class="withdraw" onclick="withdraw()">
    Вывод в Telegram
  </button>
</div>

<div class="version">
  версия 0.4.5
</div>

<script>

let balance = Number(localStorage.getItem("balance")) || 0;
let power = Number(localStorage.getItem("power")) || 1;
let price = Number(localStorage.getItem("price")) || 10;

let lastClick = 0;
let cooldown = 3000; // 3 секунды

function update() {
  document.getElementById("balance").innerText = balance;
  document.getElementById("power").innerText = power;
  document.getElementById("price").innerText = price;
}

function save() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("power", power);
  localStorage.setItem("price", price);
}

update();

// 💰 клик с задержкой
document.getElementById("clickBtn").onclick = () => {
  let now = Date.now();

  if (now - lastClick < cooldown) {
    let left = ((cooldown - (now - lastClick)) / 1000).toFixed(1);
    document.getElementById("cooldownText").innerText =
      "⏳ Подожди " + left + " сек";
    return;
  }

  lastClick = now;

  balance += power;
  save();
  update();

  document.getElementById("cooldownText").innerText = "";
};

// 🛒 улучшение
document.getElementById("upgradeBtn").onclick = () => {
  if (balance >= price) {
    balance -= price;
    power++;
    price = Math.floor(price * 1.5);

    save();
    update();
    document.getElementById("msg").innerText = "✔ Улучшение куплено!";
  } else {
    document.getElementById("msg").innerText = "❌ Не хватает монет";
  }
};

// 💸 заявка на вывод
function withdraw() {
  let userId = document.getElementById("userId").value;

  if (balance < 100) {
    alert("❌ Нужно минимум 100 монет");
    return;
  }

  if (!userId) {
    alert("❌ Введите ваш ID");
    return;
  }

  let text =
`📩 ЗАЯВКА НА ВЫВОД
ID: ${userId}
Баланс: ${balance} монет`;

  let url = "https://t.me/mzdurov?text=" + encodeURIComponent(text);

  window.open(url, "_blank");

  alert("✔ Заявка отправлена!");
}

</script>

</body>
</html>
