<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* THEMES */
.dark{background:#0f172a;color:#fff;}
.light{background:#f4f4f4;color:#000;}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  align-items:center;
  font-weight:800;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  right:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#111827;
  padding:20px;
  transition:.3s;
}
.sidebar.active{right:0;}

.dark .sidebar{color:#fff;}
.light .sidebar{color:#000; background:#fff;}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  margin-top:10px;
}

/* SAVE */
.saveBtn{
  width:100%;
  padding:12px;
  border-radius:16px;
  border:none;
  margin-top:10px;
  background:#00c6ff;
  color:#fff;
}

/* CLICK */
.clickWrap{display:flex;justify-content:center;margin-top:30px;}

.clickBtn{
  width:180px;
  height:180px;
  border-radius:50%;
  background:#00c6ff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* PNG FIX */
#crystalImg{
  width:110px;
  height:110px;
  object-fit:contain;
}

/* CARD */
.card{text-align:center;margin-top:10px;}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}
.bottom button{
  flex:1;
  padding:18px;
  border:none;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
}

.modal-content{
  background:#1f2a44;
  padding:20px;
  margin:100px auto;
  width:90%;
  max-width:400px;
  border-radius:15px;
  color:#fff;
}
</style>
</head>

<body id="body" class="dark">

<div class="header">
  AimBrawlClicker v0.6.2
  <div onclick="toggleMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h3 id="setTitle">Settings</h3>

<input id="playerId" placeholder="ID">

<label id="themeText">Theme</label>
<select id="themeSel">
<option value="dark">Dark</option>
<option value="light">Light</option>
</select>

<label id="langText">Language</label>
<select id="langSel">
<option value="ru">Русский</option>
<option value="en">English</option>
</select>

<button class="saveBtn" onclick="saveSettings()" id="saveBtn">Save</button>

</div>

<!-- MAIN -->
<div class="card">
  <p><b>ID:</b> <span id="showId"></span></p>
  <p id="balanceText">Кристаллы: <span id="balance">0</span></p>
  <p id="powerText">Сила клика: <span id="power">1</span></p>
  <p id="delayText">Задержка: <span id="delay">5</span>с</p>
  <p id="timer"></p>
</div>

<div class="clickWrap">
  <div class="clickBtn" id="clickBtn">
    <img src="crystal.png" id="crystalImg">
  </div>
</div>

<!-- SHOP -->
<div class="modal" id="shopModal">
<div class="modal-content">
<h3 id="shopTitle">Магазин</h3>

<button onclick="buy(2,50)">+2 (50)</button>
<button onclick="buy(3,100)">+3 (100)</button>
<button onclick="buy(5,300)">+5 (300)</button>
<button onclick="buy(10,1000)">+10 (1000)</button>

<button onclick="closeShop()">Close</button>
<p id="shopMsg"></p>
</div>
</div>

<!-- WITHDRAW -->
<div class="modal" id="withdrawModal">
<div class="modal-content">
<h3 id="wTitle">Подтверждение</h3>
<p id="confirmText"></p>
<button onclick="createWithdraw()">Создать заявку</button>
<button onclick="closeWithdraw()">Отмена</button>
</div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <button onclick="openShop()">🛒</button>
  <button onclick="openWithdraw()">💸</button>
</div>

<script>

/* LANG */
const t={
ru:{shop:"Магазин",confirm:"Подтверждение",create:"Создать заявку"},
en:{shop:"Shop",confirm:"Confirm",create:"Create request"}
};

let lang=localStorage.getItem("lang")||"ru";

/* DATA */
let balance=+localStorage.getItem("balance")||0;
let power=1; // FIX

let playerId=localStorage.getItem("playerId")||"";
let theme=localStorage.getItem("theme")||"dark";

let cooldownUntil=+localStorage.getItem("cooldownUntil")||0;

document.getElementById("body").className=theme;
document.getElementById("playerId").value=playerId;

/* SAVE */
function save(){
 localStorage.setItem("balance",balance);
 localStorage.setItem("playerId",playerId);
 localStorage.setItem("theme",theme);
 localStorage.setItem("lang",lang);
 localStorage.setItem("cooldownUntil",cooldownUntil);
}

/* UPDATE */
function update(){
 document.getElementById("balance").innerText=balance;
 document.getElementById("power").innerText=power;
 document.getElementById("showId").innerText=playerId||"-";
}

/* TIMER */
function startTimer(){
 let interval=setInterval(()=>{
  let left=cooldownUntil-Date.now();

  if(left<=0){
    document.getElementById("timer").innerText="";
    clearInterval(interval);
    return;
  }

  document.getElementById("timer").innerText=Math.ceil(left/1000)+"s";
 },200);
}

/* CLICK */
document.getElementById("clickBtn").onclick=()=>{
 if(Date.now()<cooldownUntil) return;

 balance+=power;
 cooldownUntil=Date.now()+5000;

 save();
 update();
 startTimer();
};

if(Date.now()<cooldownUntil) startTimer();

/* SETTINGS */
function saveSettings(){
 playerId=document.getElementById("playerId").value;
 theme=document.getElementById("themeSel").value;
 lang=document.getElementById("langSel").value;

 document.getElementById("body").className=theme;

 save();
 update();
 toggleMenu();
}

/* MENU */
function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("active");
}

/* SHOP */
function openShop(){
 document.getElementById("shopModal").style.display="block";
}
function closeShop(){
 document.getElementById("shopModal").style.display="none";
}
function buy(p,c){
 if(balance<c) return;
 balance-=c;
 power+=p;
 save();
 update();
}

/* WITHDRAW */
function openWithdraw(){
 document.getElementById("confirmText").innerText="ID: "+playerId+" | "+balance;
 document.getElementById("withdrawModal").style.display="block";
}
function closeWithdraw(){
 document.getElementById("withdrawModal").style.display="none";
}
function createWithdraw(){
 window.open("https://forms.gle/H24uHTgV68MiKC6m9","_blank");
 balance=0;
 save();
 update();
}

update();

</script>

</body>
</html>
