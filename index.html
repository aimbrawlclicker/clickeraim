<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  transition: 0.3s;
}

.dark {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.light {
  background: #f2f2f2;
  color: black;
}

h1 { margin-top: 20px; }

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

.click { background: #00c6ff; font-size: 22px; }
.menu { background: #ffb347; }
.withdraw { background: #ff4b5c; }
.upg { background: #7c4dff; }

.version {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 14px;
  opacity: 0.7;
}

/* модалки */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background: #1f2a44;
  padding: 20px;
  margin: 80px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}
</style>
</head>

<body id="body" class="dark">

<h1>💎 AimBrawlClicker</h1>

<div class="card">
  <h3>👤 ID: <span id="showId">не установлен</span></h3>
  <button class="menu" onclick="openSettings()">⚙ Настройки</button>
</div>

<div class="card">
  <button class="click" id="clickBtn">КЛИК!</button>

  <p>Баланс: <span id="balance">0</span> 💎</p>
  <p>Сила клика: <span id="power">1</span></p>

  <p id="timer"></p>
</div>

<div class="card">
  <button class="menu" onclick="openShop()">🛒 Магазин</button>
</div>

<div class="card">
  <h2>💸 Вывод</h2>

  <button class="withdraw" onclick="openWithdraw()">Вывести</button>

  <p id="withdrawMsg"></p>
</div>

<div class="version">версия 0.5.1</div>

<!-- ⚙ НАСТРОЙКИ -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h3>⚙ Настройки</h3>

    <input id="playerIdInput" placeholder="Ваш ID">

    <br><br>

    <label>🎨 Тема:</label>
    <select id="themeSelect">
      <option value="dark">Темная</option>
      <option value="light">Светлая</option>
    </select>

    <br><br>

    <label>🌍 Язык:</label>
    <select id="langSelect">
      <option value="ru">Русский</option>
      <option value="en">English</option>
    </select>

    <button onclick="saveSettings()" class="menu">Сохранить</button>
    <button onclick="closeSettings()">Закрыть</button>
  </div>
</div>

<!-- 🛒 МАГАЗИН -->
<div class="modal" id="shopModal">
  <div class="modal-content">
    <h3>🛒 Магазин</h3>

    <button class="upg" onclick="buy(2,100,'u1')">+2 (100 💎)</button>
    <button class="upg" onclick="buy(3,250,'u2')">+3 (250 💎)</button>
    <button class="upg" onclick="buy(5,500,'u3')">+5 (500 💎)</button>
    <button class="upg" onclick="buy(10,1500,'u4')">+10 (1500 💎)</button>

    <button onclick="closeShop()">Закрыть</button>

    <p id="shopMsg"></p>
  </div>
</div>

<!-- 💸 ВЫВОД -->
<div class="modal" id="withdrawModal">
  <div class="modal-content">
    <h3>⚠ Подтверждение</h3>

    <p id="confirmText"></p>

    <p style="font-size:14px;">
      📸 Сделайте скриншот этого окна
    </p>

    <button class="withdraw" onclick="createWithdraw()">Создать заявку</button>
    <button onclick="closeWithdraw()">Отмена</button>
  </div>
</div>

<script>

let balance = Number(localStorage.getItem("balance")) || 0;
let power = Number(localStorage.getItem("power")) || 1;
let playerId = localStorage.getItem("playerId") || "";
let upgrades = JSON.parse(localStorage.getItem("upgrades")) || {};
let theme = localStorage.getItem("theme") || "dark";

let clickCooldown = false;
let lang = localStorage.getItem("lang") || "ru";

document.getElementById("body").className = theme;

function update() {
  document.getElementById("balance").innerText = balance;
  document.getElementById("power").innerText = power;
  document.getElementById("showId").innerText = playerId || "не установлен";
}

function save() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("power", power);
  localStorage.setItem("playerId", playerId);
  localStorage.setItem("upgrades", JSON.stringify(upgrades));
}

// 💰 клик с таймером
document.getElementById("clickBtn").onclick = () => {
  if (clickCooldown) return;

  balance += power;
  save();
  update();

  let t = 3;
  document.getElementById("timer").innerText = t + "s";

  clickCooldown = true;

  let interval = setInterval(() => {
    t--;
    document.getElementById("timer").innerText = t > 0 ? t + "s" : "";
  }, 1000);

  setTimeout(() => {
    clickCooldown = false;
    clearInterval(interval);
  }, 3000);
};

update();

// 🛒 магазин
function openShop() {
  document.getElementById("shopModal").style.display = "block";
}
function closeShop() {
  document.getElementById("shopModal").style.display = "none";
}

function buy(add, cost, id) {
  if (upgrades[id]) return;

  if (balance < cost) return;

  balance -= cost;
  power += add;
  upgrades[id] = true;

  save();
  update();
}

// ⚙ настройки
function openSettings() {
  document.getElementById("settingsModal").style.display = "block";
  document.getElementById("playerIdInput").value = playerId;
  document.getElementById("themeSelect").value = theme;
  document.getElementById("langSelect").value = lang;
}

function closeSettings() {
  document.getElementById("settingsModal").style.display = "none";
}

function saveSettings() {
  playerId = document.getElementById("playerIdInput").value;
  theme = document.getElementById("themeSelect").value;
  lang = document.getElementById("langSelect").value;

  localStorage.setItem("theme", theme);
  localStorage.setItem("lang", lang);

  document.getElementById("body").className = theme;

  save();
  update();
  closeSettings();
}

// 💸 вывод
function openWithdraw() {
  if (balance < 100) return alert("❌ Нужно 100 💎");
  if (!playerId) return alert("❌ Укажи ID");

  document.getElementById("confirmText").innerText =
`ID: ${playerId}
Вывод: ${balance} 💎`;

  document.getElementById("withdrawModal").style.display = "block";
}

function closeWithdraw() {
  document.getElementById("withdrawModal").style.display = "none";
}

function createWithdraw() {
  balance = 0;
  save();
  update();

  closeWithdraw();

  document.getElementById("withdrawMsg").innerText =
"📩 Заявка отправлена!";

  window.open("https://forms.gle/H24uHTgV68MiKC6m9", "_blank");
}

</script>

</body>
</html>
