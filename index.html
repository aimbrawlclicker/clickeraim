<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  transition: 0.3s;
}

/* темы */
.dark {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
}

.light {
  background: #f4f4f4;
  color: #111;
}

/* header */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}

.menuBtn {
  font-size: 26px;
  cursor: pointer;
}

/* карточки */
.card {
  margin: 15px auto;
  width: 90%;
  max-width: 420px;
  padding: 18px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

/* кнопки */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  margin-top: 10px;
  cursor: pointer;
}

.click { background:#00c6ff; font-size:20px; }
.upg { background:#7c4dff; color:white; }
.withdraw { background:#ff4b5c; }
.shop { background:#ffb347; }

/* sidebar */
.sidebar {
  position: fixed;
  top: 0;
  right: -260px;
  width: 240px;
  height: 100%;
  background: #111827;
  padding: 20px;
  transition: 0.3s;
  color: white;
  z-index: 999;
}

.sidebar.active { right: 0; }

/* 🌟 КРАСИВЫЕ СЕЛЕКТЫ */
select {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  margin-top: 6px;
}

/* версия */
.version {
  position: fixed;
  bottom: 10px;
  left: 10px;
  opacity: 0.6;
}

/* модалка */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background: #1f2a44;
  padding: 20px;
  margin: 80px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}
</style>
</head>

<body id="body" class="dark">

<div class="header">
  <div>AimBrawlClicker</div>
  <div class="menuBtn" onclick="toggleMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <h3>⚙ Settings</h3>

  <input id="playerId" placeholder="ID">

  <br><br>

  <label>🌙 Theme</label>
  <select id="themeSel">
    <option value="dark">Dark</option>
    <option value="light">Light</option>
  </select>

  <br><br>

  <label>🌍 Language</label>
  <select id="langSel">
    <option value="ru">Русский</option>
    <option value="en">English</option>
  </select>

  <button onclick="saveSettings()" class="shop">Save</button>

</div>

<!-- MAIN -->
<div class="card">
  <button class="click" id="clickBtn">КЛИК!</button>

  <p id="balanceText">Баланс: <span id="balance">0</span> 💎</p>
  <p id="powerText">Сила: <span id="power">1</span></p>
  <p id="timer"></p>
</div>

<div class="card">
  <button class="shop" onclick="openShop()">🛒 Магазин</button>
</div>

<div class="card">
  <button class="withdraw" onclick="openWithdraw()">💸 Вывод</button>
  <p id="withdrawMsg"></p>
</div>

<div class="version">v0.5.6</div>

<!-- 🛒 SHOP -->
<div class="modal" id="shopModal">
  <div class="modal-content">
    <h3>🛒 Shop</h3>

    <button class="upg" onclick="buy(2,100,'u1')">+2 (100 💎)</button>
    <button class="upg" onclick="buy(3,250,'u2')">+3 (250 💎)</button>
    <button class="upg" onclick="buy(5,500,'u3')">+5 (500 💎)</button>
    <button class="upg" onclick="buy(10,1500,'u4')">+10 (1500 💎)</button>

    <button onclick="closeShop()">Close</button>
    <p id="shopMsg"></p>
  </div>
</div>

<!-- 💸 CONFIRM -->
<div class="modal" id="withdrawModal">
  <div class="modal-content">
    <h3>⚠ Confirm withdraw</h3>

    <p id="confirmText"></p>

    <p>📸 Screenshot required</p>

    <button class="withdraw" onclick="createWithdraw()">Create request</button>
    <button onclick="closeWithdraw()">Cancel</button>
  </div>
</div>

<script>

let balance = +localStorage.getItem("balance") || 0;
let power = +localStorage.getItem("power") || 1;
let playerId = localStorage.getItem("playerId") || "";
let theme = localStorage.getItem("theme") || "dark";
let lang = localStorage.getItem("lang") || "ru";

let upgrades = JSON.parse(localStorage.getItem("upgrades")) || {};
let cooldown = false;

document.getElementById("body").className = theme;

/* 🌍 LANG FIX */
const t = {
  ru: { click:"КЛИК!", balance:"Баланс", power:"Сила" },
  en: { click:"CLICK!", balance:"Balance", power:"Power" }
};

function applyLang(){
  document.getElementById("clickBtn").innerText = t[lang].click;
  document.getElementById("balanceText").innerHTML =
    t[lang].balance + ": <span id='balance'>" + balance + "</span> 💎";

  document.getElementById("powerText").innerHTML =
    t[lang].power + ": <span id='power'>" + power + "</span>";
}

applyLang();

/* save */
function save(){
  localStorage.setItem("balance",balance);
  localStorage.setItem("power",power);
  localStorage.setItem("playerId",playerId);
  localStorage.setItem("theme",theme);
  localStorage.setItem("lang",lang);
  localStorage.setItem("upgrades",JSON.stringify(upgrades));
}

function update(){
  document.getElementById("balance").innerText = balance;
  document.getElementById("power").innerText = power;
}

/* CLICK + TIMER FIX */
document.getElementById("clickBtn").onclick = () => {
  if(cooldown) return;

  balance += power;
  save();
  update();

  let t = 3;
  document.getElementById("timer").innerText = t + "s";

  cooldown = true;

  let interval = setInterval(()=>{
    t--;
    document.getElementById("timer").innerText = t>0?t+"s":"";
  },1000);

  setTimeout(()=>{
    cooldown=false;
    clearInterval(interval);
  },3000);
};

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

/* SETTINGS FIX */
function saveSettings(){
  playerId = document.getElementById("playerId").value;
  theme = document.getElementById("themeSel").value;
  lang = document.getElementById("langSel").value;

  document.getElementById("body").className = theme;

  save();
  applyLang();
  update();

  toggleMenu();
}

/* SHOP FIX */
function openShop(){
  document.getElementById("shopModal").style.display="block";
}
function closeShop(){
  document.getElementById("shopModal").style.display="none";
}
function buy(p,c,id){
  if(upgrades[id]) return;
  if(balance<c) return;

  balance-=c;
  power+=p;
  upgrades[id]=true;

  save();
  update();
}

/* WITHDRAW FIX (вернул окно!) */
function openWithdraw(){
  if(balance<100) return alert("❌ min 100");

  document.getElementById("confirmText").innerText =
  "ID: "+playerId+"\n💎 "+balance;

  document.getElementById("withdrawModal").style.display="block";
}

function closeWithdraw(){
  document.getElementById("withdrawModal").style.display="none";
}

function createWithdraw(){
  balance=0;
  save();
  update();

  closeWithdraw();

  window.open("https://forms.gle/H24uHTgV68MiKC6m9","_blank");
}

update();

</script>

</body>
</html>
