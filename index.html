<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  transition:.3s;
  overflow-x:hidden;
}

/* THEMES */
.dark{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;}
.light{background:#f4f4f4;color:#111;}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  align-items:center;
}

.title{font-weight:800;font-size:20px;}
.version{font-size:14px;opacity:.7;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  right:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#111827;
  padding:20px;
  transition:.3s;
}
.sidebar.active{right:0}

/* TEXT FIX */
.light .sidebar{color:#000;}
.dark .sidebar{color:#fff;}

input,select{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  margin-top:8px;
}

/* MODERN SAVE BUTTON */
.saveBtn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:16px;
  margin-top:15px;
  background:#00c6ff;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

/* CLICK BUTTON BIGGER */
.clickWrap{
  display:flex;
  justify-content:center;
  margin-top:40px;
}

.clickBtn{
  width:170px;
  height:170px;
  border-radius:50%;
  background:#00c6ff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.15s;
}

#crystalImg{
  width:100px;
  height:100px;
  pointer-events:none;
}

.clickBtn:active{transform:scale(0.9);}

/* FX */
.crystal-fx{
  position:absolute;
  width:30px;
  height:30px;
  pointer-events:none;
  animation:fly 0.8s ease-out forwards;
}

@keyframes fly{
  0%{transform:translate(0,0);opacity:1;}
  100%{transform:translate(var(--x),var(--y));opacity:0;}
}

/* BOTTOM MENU */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}

.bottom button{
  flex:1;
  padding:18px;
  border:none;
  font-size:16px;
  border-radius:20px 20px 0 0;
}

/* CARD */
.card{text-align:center;margin-top:10px;}
.bold{font-weight:700;}
</style>
</head>

<body id="body" class="dark">

<div class="header">
  <div class="title">AimBrawlClicker <span class="version">v0.6.1</span></div>
  <div onclick="toggleMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h3 id="setTitle">Settings</h3>

<input id="playerId" placeholder="ID">

<label id="themeText">Theme</label>
<select id="themeSel">
<option value="dark">Dark</option>
<option value="light">Light</option>
</select>

<label id="langText">Language</label>
<select id="langSel">
<option value="ru">Русский</option>
<option value="en">English</option>
</select>

<button class="saveBtn" onclick="saveSettings()" id="saveBtn">Save</button>

</div>

<!-- MAIN -->
<div class="card">
  <p><span class="bold">ID:</span> <span id="showId">—</span></p>
  <p>Кристаллы: <span id="balance">0</span></p>
  <p>Сила клика: <span id="power">1</span></p>
  <p>Задержка: <span id="delay">5</span>с</p>
  <p id="timer"></p>
</div>

<div class="clickWrap">
  <div class="clickBtn" id="clickBtn">
    <img src="crystal.png" id="crystalImg">
  </div>
</div>

<!-- MODALS -->
<div id="shopModal" style="display:none;">
  <div class="card">
    <p>🛒 Магазин</p>
    <button onclick="buy(2,100)">+2 (100)</button>
    <button onclick="buy(5,500)">+5 (500)</button>
    <button onclick="closeShop()">Закрыть</button>
  </div>
</div>

<div id="withdrawModal" style="display:none;">
  <div class="card">
    <p>💸 Вывод</p>
    <button onclick="createWithdraw()">Создать</button>
    <button onclick="closeWithdraw()">Закрыть</button>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <button onclick="openShop()">🛒</button>
  <button onclick="openWithdraw()">💸</button>
</div>

<script>

/* LANG */
const t={
 ru:{settings:"Настройки",theme:"Тема",lang:"Язык",save:"Сохранить"},
 en:{settings:"Settings",theme:"Theme",lang:"Language",save:"Save"}
};

let lang=localStorage.getItem("lang")||"ru";

function applyLang(){
 document.getElementById("setTitle").innerText=t[lang].settings;
 document.getElementById("themeText").innerText=t[lang].theme;
 document.getElementById("langText").innerText=t[lang].lang;
 document.getElementById("saveBtn").innerText=t[lang].save;
}

applyLang();

/* DATA */
let balance=+localStorage.getItem("balance")||0;
let power=+localStorage.getItem("power")||1;

let playerId=localStorage.getItem("playerId")||"";

let theme=localStorage.getItem("theme")||"dark";
document.getElementById("body").className=theme;

let cooldownUntil=+localStorage.getItem("cooldownUntil")||0;

document.getElementById("playerId").value=playerId;

function save(){
 localStorage.setItem("balance",balance);
 localStorage.setItem("power",power);
 localStorage.setItem("playerId",playerId);
 localStorage.setItem("theme",theme);
 localStorage.setItem("lang",lang);
 localStorage.setItem("cooldownUntil",cooldownUntil);
}

function update(){
 document.getElementById("balance").innerText=balance;
 document.getElementById("power").innerText=power;
 document.getElementById("showId").innerText=playerId||"—";
}

/* CLICK */
document.getElementById("clickBtn").onclick=()=>{
 if(Date.now()<cooldownUntil) return;

 spawnCrystals();

 balance+=power;
 cooldownUntil=Date.now()+5000;

 save();
 update();
};

/* FX */
function spawnCrystals(){
 let btn=document.getElementById("clickBtn");
 let rect=btn.getBoundingClientRect();

 for(let i=0;i<5;i++){
  let el=document.createElement("img");
  el.src="crystal.png";
  el.className="crystal-fx";

  el.style.left=rect.left+"px";
  el.style.top=rect.top+"px";

  el.style.setProperty("--x",(Math.random()*200-100)+"px");
  el.style.setProperty("--y",(Math.random()*-200)+"px");

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
 }
}

/* SETTINGS */
function saveSettings(){
 playerId=document.getElementById("playerId").value;
 theme=document.getElementById("themeSel").value;
 lang=document.getElementById("langSel").value;

 document.getElementById("body").className=theme;

 save();
 applyLang();
 update();
 toggleMenu();
}

/* MENU */
function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("active");
}

/* SHOP */
function openShop(){document.getElementById("shopModal").style.display="block";}
function closeShop(){document.getElementById("shopModal").style.display="none";}
function buy(p,c){
 if(balance<c) return;
 balance-=c;
 power+=p;
 save();
 update();
}

/* WITHDRAW */
function openWithdraw(){document.getElementById("withdrawModal").style.display="block";}
function closeWithdraw(){document.getElementById("withdrawModal").style.display="none";}
function createWithdraw(){
 balance=0;
 save();
 update();
}

update();

</script>

</body>
</html>
