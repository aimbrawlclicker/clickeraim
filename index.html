<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimBrawlClicker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
}

h1 { margin-top: 20px; }

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 15px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

.click { background: #00c6ff; font-size: 22px; }
.menu { background: #ffb347; }
.withdraw { background: #ff4b5c; }
.upg { background: #7c4dff; }

.version {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 14px;
  opacity: 0.7;
}

/* модалка */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background: #1f2a44;
  padding: 20px;
  margin: 80px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}
</style>
</head>

<body>

<h1>💰 AimBrawlClicker</h1>

<div class="card">
  <button class="click" id="clickBtn">КЛИК!</button>

  <p>Баланс: <span id="balance">0</span></p>
  <p>Сила клика: <span id="power">1</span></p>
</div>

<div class="card">
  <button class="menu" onclick="openShop()">🛒 Магазин</button>
</div>

<div class="card">
  <h2>💸 Вывод</h2>

  <input id="userId" placeholder="Введите ваш ID">

  <button class="withdraw" onclick="openWithdraw()">
    Вывести
  </button>

  <p id="withdrawMsg"></p>
</div>

<div class="version">версия 0.5</div>

<!-- 🛒 МАГАЗИН -->
<div class="modal" id="shopModal">
  <div class="modal-content">
    <h3>🛒 Магазин улучшений</h3>

    <button class="upg" onclick="buy(2,100,'u1')">+2 к клику (100 монет)</button>
    <button class="upg" onclick="buy(3,250,'u2')">+3 к клику (250 монет)</button>
    <button class="upg" onclick="buy(5,500,'u3')">+5 к клику (500 монет)</button>
    <button class="upg" onclick="buy(10,1500,'u4')">+10 к клику (1500 монет)</button>

    <button onclick="closeShop()" style="margin-top:10px;">Закрыть</button>

    <p id="shopMsg"></p>
  </div>
</div>

<!-- 💸 ОКНО ВЫВОДА -->
<div class="modal" id="withdrawModal">
  <div class="modal-content">
    <h3>⚠ Подтверждение вывода</h3>

    <p id="confirmText"></p>

    <p style="font-size:14px; opacity:0.8;">
      📸 Сделайте скриншот этого окна
    </p>

    <button class="withdraw" onclick="createWithdraw()">
      Создать заявку
    </button>

    <button onclick="closeWithdraw()" style="margin-top:10px;">
      Отмена
    </button>
  </div>
</div>

<script>

let balance = Number(localStorage.getItem("balance")) || 0;
let power = Number(localStorage.getItem("power")) || 1;
let upgrades = JSON.parse(localStorage.getItem("upgrades")) || {};

let clickCooldown = false;

function update() {
  document.getElementById("balance").innerText = balance;
  document.getElementById("power").innerText = power;
}

function save() {
  localStorage.setItem("balance", balance);
  localStorage.setItem("power", power);
  localStorage.setItem("upgrades", JSON.stringify(upgrades));
}

update();


// 💰 КЛИК (3 секунды задержка)
document.getElementById("clickBtn").onclick = () => {
  if (clickCooldown) return;

  balance += power;
  save();
  update();

  clickCooldown = true;

  setTimeout(() => {
    clickCooldown = false;
  }, 3000);
};


// 🛒 МАГАЗИН
function openShop() {
  document.getElementById("shopModal").style.display = "block";
}

function closeShop() {
  document.getElementById("shopModal").style.display = "none";
}

function buy(addPower, cost, id) {
  if (upgrades[id]) {
    document.getElementById("shopMsg").innerText = "❌ Уже куплено";
    return;
  }

  if (balance < cost) {
    document.getElementById("shopMsg").innerText = "❌ Не хватает монет";
    return;
  }

  balance -= cost;
  power += addPower;

  upgrades[id] = true;

  save();
  update();

  document.getElementById("shopMsg").innerText = "✔ Куплено!";
}


// 💸 ВЫВОД
function openWithdraw() {
  let userId = document.getElementById("userId").value;

  if (balance < 100) {
    alert("❌ Нужно минимум 100 монет");
    return;
  }

  if (!userId) {
    alert("❌ Введите ID");
    return;
  }

  document.getElementById("confirmText").innerText =
`ID: ${userId}
Баланс: ${balance} монет`;

  document.getElementById("withdrawModal").style.display = "block";
}

function closeWithdraw() {
  document.getElementById("withdrawModal").style.display = "none";
}

function createWithdraw() {
  let sendBalance = balance;

  balance = 0;
  save();
  update();

  closeWithdraw();

  document.getElementById("withdrawMsg").innerText =
"📩 Заявка отправлена!";

  window.open("https://forms.gle/H24uHTgV68MiKC6m9", "_blank");
}

</script>

</body>
</html>
